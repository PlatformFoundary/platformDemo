apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "socpoc.fullname" . }}-nginx-conf
  labels:
    {{- include "socpoc.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
        listen 8080;

        location / {
            root   /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass         http://{{ include "socpoc.backendServiceName" . }}:{{ .Values.backend.service.port }};
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
