name: Terraform CI Pipeline On Pull

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: Demo
    if: github.event_name == 'pull_request'
    env:
      TF_VAR_github_app_pem: ${{ secrets.PEM_GITHUB_APP }}
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init --var-file=terraform.tfvars

      # - name: Terraform Validate
      #   working-directory: terraform
      #   run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        working-directory: terraform
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          terraform plan \
            --var-file=terraform.tfvars \
            -var="aks_api_server_authorized_ip_ranges=[\"$PUBLIC_IP/32\"]" \
            -out=tfplan \
            -input=false || true

      - name: Terraform Show (JSON)
        working-directory: terraform
        run: terraform show -json tfplan > tfplan.json || true

      - name: Trivy IaC Scan - Terraform Code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform/
          format: table
          severity: CRITICAL,HIGH

      - name: Trivy IaC Scan - Terraform Plan
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: config
          scan-ref: terraform/tfplan.json
          format: table
          severity: CRITICAL,HIGH

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Plan 📝
            \`\`\`
            Plan output available in workflow artifacts
            \`\`\`
            *Trivy IaC scan completed - check workflow logs for details*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });